<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seerah Timeline Pro</title><style>
body {
  font-family: Arial;
  margin:0;
  background:#0f172a;
  color:#fff;
}

header {
  padding:15px;
  font-size:22px;
  background:#111827;
  text-align:center;
}

.container {
  padding:15px;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:15px;
}

.card {
  background:#1e293b;
  margin:12px 0;
  padding:16px;
  border-radius:14px;
}

.title {
  font-size:18px;
  font-weight:bold;
}

.era {
  font-size:12px;
  opacity:0.7;
}

.highlight {
  background: yellow;
  color: black;
}

button {
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#22c55e;
}
</style></head><body><header>Seerah Timeline Pro</header><div class="container">
<input type="text" id="search" placeholder="Search events..." />
<div id="app"></div>
</div><script>
let allData = [];

function speakWithHighlight(text, element){
  speechSynthesis.cancel();

  const words = text.split(" ");
  let index = 0;

  const utter = new SpeechSynthesisUtterance(text);

  utter.onboundary = function(event){
    if(event.name === "word"){
      words[index] = `<span class="highlight">${words[index]}</span>`;
      element.innerHTML = words.join(" ");
      index++;
    }
  };

  utter.onend = () => {
    element.innerHTML = text;
  };

  speechSynthesis.speak(utter);
}

function render(data){
  const app = document.getElementById('app');
  app.innerHTML = '';

  data.forEach(e => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="title">${e.id}. ${e.title}</div>
      <div class="era">${e.era}</div>
      <p id="story-${e.id}">${e.story}</p>
      <button onclick="speakWithHighlight('${e.story}', document.getElementById('story-${e.id}'))">
        ▶ Play + Highlight
      </button>
    `;

    app.appendChild(div);
  });
}

fetch('seerah_full.json')
.then(res => res.json())
.then(data => {
  allData = data;
  render(data);
});

document.getElementById('search').addEventListener('input', function(e){
  const val = e.target.value.toLowerCase();
  const filtered = allData.filter(x =>
    x.title.toLowerCase().includes(val) ||
    x.story.toLowerCase().includes(val)
  );
  render(filtered);
});
</script></body>
</html>
